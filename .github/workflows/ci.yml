name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gate:
    name: "§13 gate (build · vet · gofmt · test -race)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt needs to be run on:" >&2
            echo "$out" >&2
            exit 1
          fi

      - name: go test -race
        run: go test ./... -race
